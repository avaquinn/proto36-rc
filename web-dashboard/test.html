<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PROTO36 WebSocket Test</title>
</head>
<body>
    <h1>PROTO36 WebSocket Test</h1>

    <button id="connect">Connect</button>
    <button id="send">Send Test Command</button>

    <pre id="status">Disconnected</pre>

    <script>
        let socket;

        const status = document.getElementById("status");

        document.getElementById("connect").addEventListener("click", () => {
            socket = new WebSocket("ws://10.0.0.135:8765");

            socket.addEventListener("open", () => {
                status.textContent = "Connected";
            });

            socket.addEventListener("message", (event) => {
                status.textContent += "\nReceived: " + event.data;
            });

            socket.addEventListener("close", () => {
                status.textContent += "\nDisconnected";
            });

            socket.addEventListener("error", () => {
                status.textContent += "\nWebSocket error";
            });
        });

        document.getElementById("send").addEventListener("click", () => {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                status.textContent += "\nNot connected";
                return;
            }

            socket.send(JSON.stringify({
                steering: 0.25,
                throttle: 0.10
            }));
        });
    </script>
</body>
</html>
